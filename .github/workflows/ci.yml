name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  license:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: LICENSE is Apache 2.0
        run: |
          if [ ! -f LICENSE ]; then
            echo "LICENSE file is missing"
            exit 1
          fi
          if ! grep -q "Apache License" LICENSE || ! grep -q "Version 2.0" LICENSE; then
            echo "LICENSE is not Apache License 2.0"
            exit 1
          fi
          echo "LICENSE is Apache 2.0"

  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
      - run: npm ci
      - run: npm run smoke
      # Offline unified-plug wire-contract test (0.7.0): asserts target_entity_id /
      # owner_token / cloudgrid.yaml-part semantics against a mocked API.
      - run: npm run test:plug-wire

  drift-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
      - run: npm ci
      - run: npm run test:drift-guard

  # Regression guard for the Windows bundled-CLI resolution bug (Task 28): the
  # bundled CLI must resolve from a Windows-style `file:///C:/...` module URL.
  # The test injects Windows path semantics so it runs deterministically on the
  # Linux runner; it fails on the old `new URL().pathname` code and passes on the
  # `fileURLToPath` fix.
  win-cli:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
      - run: npm ci
      - run: npm run test:win-cli
      # Regression guard for the Claude Desktop .mcpb Electron-spawn bug (Task
      # 30): bundled-CLI spawns must carry ELECTRON_RUN_AS_NODE=1, route through
      # cli-shim.mjs, never blindly trust process.execPath under Electron, and
      # fall through to the global-CLI/npx rungs on runtime boot failure. Fails
      # on the pre-fix code, passes on the fix.
      - run: npm run test:electron-env

  # API drift guard: the web/local editions call api.cloudgrid.io directly (drop
  # → POST /api/v2/plug, claim → POST /api/v2/entities/:id/pickup). The CLI-verb
  # drift guard above does NOT cover these direct HTTP endpoints, so a
  # deleted/renamed API endpoint would otherwise reach prod silently (this is
  # exactly how the platform once deleted the MCP's drop/claim endpoints out
  # from under it). smoke:web spawns the web edition and performs a real
  # anonymous drop against the live API, asserting a guest URL comes back — so
  # this class of break fails CI, not prod.
  smoke-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
      - run: npm ci
      - run: npm run smoke:web
