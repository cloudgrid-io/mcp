name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  license:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: LICENSE is Apache 2.0
        run: |
          if [ ! -f LICENSE ]; then
            echo "LICENSE file is missing"
            exit 1
          fi
          if ! grep -q "Apache License" LICENSE || ! grep -q "Version 2.0" LICENSE; then
            echo "LICENSE is not Apache License 2.0"
            exit 1
          fi
          echo "LICENSE is Apache 2.0"

  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 20
      - run: npm ci
      - run: npm run smoke
      # Offline unified-plug wire-contract test (0.7.0): asserts target_entity_id /
      # owner_token / cloudgrid.yaml-part semantics against a mocked API.
      - run: npm run test:plug-wire
      # Offline self-healing test (0.7.2): known-code error guidance is mapped
      # (unknown codes pass through unchanged), the local-edition CLI self-heal
      # rung fires only for a signed-in SCOPE_INVALID create (not web/anon/edit),
      # and grid_fetch resolves kind:"rule".
      - run: npm run test:self-healing
      # Offline grid-picker parity test (0.7.3): grid_plug asks "which grid?"
      # on authed multi-grid creates (like grid_drop), never on edits/anon,
      # and proceeds on an explicit/single grid. Drives the real tool handlers.
      - run: npm run test:grid-picker
      # Offline output-schema regression (grid_deploy -32602): one outputSchema,
      # three response modes (deploy result / grid-picker ask / CLI-fallback). The
      # SDK renders additionalProperties:false and the client validates every
      # result - undeclared picker/fallback keys throw -32602. Real Client<->Server
      # round-trip.
      - run: npm run test:plug-output-schema
      # Zip deploys: extraction guards, static-app wrapper, CLI leg, html+zip combo.
      - run: npm run test:zip-deploy
      # Create-path hard gates: no-auth create -> needs_auth (not silent anon);
      # authed multi-grid create -> needs_grid; anon/edit/explicit-grid bypass.
      - run: npm run test:create-gates
      # Bundle-boot: build the .mcpb, extract to a spaced path, boot it over
      # stdio, assert initialize returns. Catches a broken artifact (missing
      # files) that unit tests never exercise. (mcpb crashed silently since 0.20.12.)
      - run: npm run test:mcpb-boot
      # Offline upload-timeout test: the /api/v2/plug POST aborts (not hangs)
      # when the server stalls, surfacing a "may still be building — check
      # status" error instead of the "getting stuck" bug.
      - run: npm run test:plug-timeout
      # Offline manifest-aware confirm test: a CREATE whose source already
      # carries a cloudgrid.yaml returns needs_confirmation (does not
      # auto-create) until grid_plug is re-called with confirm_new_app:true.
      - run: npm run test:manifest-confirm
      # Offline QA courier test (0.20.5): grid_deploy's user_request + session_note
      # args reach the flushed QA session log, stay [omitted] in the per-call trail
      # (default-deny allowlist), respect stdio env precedence, and a successful
      # deploy nudges grid_note only when a QA logger is active. Drives the real
      # tool handlers with a mocked plug API + stub sink.
      - run: npm run test:qa-courier
      # Offline consent-gated error-reporting test (0.8.1): grid_report posts
      # {app:"mcp", message, context, node_version, platform} to
      # /api/v2/errors/feedback (Bearer authed / trusted-server anon), scrubs
      # secret-looking context keys, defaults include_conversation false, degrades
      # gracefully on 401/429/network errors; the errorGuidance report offer is
      # appended for 5xx/INTERNAL_ERROR/build-deploy failures but NOT for
      # 429/needs_grid/401/409 EDIT_REJECTED.
      - run: npm run test:error-reporting
      # Offline inline source-fetch test (Task 35 / 0.8.3): grid_source resolves
      # the fetch URL (explicit url > session lastDrop > grid+slug > fail), enforces
      # the *.cloudgrid.io SSRF guard (no fetch off-list, redirects included),
      # returns HTML inline + structuredContent.html/bytes/truncated, fails
      # gracefully on non-200, and the grid_source tool + playbook/drop/plug
      # guidance are wired. Mocks global fetch.
      - run: npm run test:source
      # Offline app-with-data test (0.9.0): the first runtime (DB-backed) build
      # path. Asserts the app-with-data workflow/template/example + persistent-apps
      # troubleshooting resolve via fetchCorpus and the real grid_fetch handler,
      # the intent shows in the grid_start menu, the PLAYBOOK carries the
      # persistence rule, the workflow gates the hosted edition, and the template is
      # internally consistent (active needs: {database: true}, reads
      # process.env.DATABASE_MONGODB_URL, no hardcoded connection string/secret).
      - run: npm run test:app-with-data
      # Offline self-describing templates test (0.11.0+): the 6 workflows carry
      # enriched when:/needs:/deploy:/editions:/capabilities_note: frontmatter, the
      # capability-map fetches as a doc, each static template dir has a reference
      # cloudgrid.yaml (type: static) + index.md, app-with-data uses active
      # needs: {database: true} with NO active requires:, and NO template yaml has
      # active needs: AND requires: together (validator-rejected combo).
      - run: npm run test:self-describing
      # Offline canonical cloudgrid.yaml reference test (0.11.1+): the corpus doc
      # cloudgrid-yaml fetches via fetchCorpus + the real grid_fetch handler,
      # carries the full needs: vocabulary + injected env var names + validation
      # rules + a full example, the needs-vs-requires note (#1527 fixed), and the DB
      # example uses active needs: {database: true} with NO active requires: —
      # GUARDING that no yaml block shows active needs: AND requires: together.
      # Also asserts the PLAYBOOK + capability-map cross-links.
      - run: npm run test:canonical-yaml
      # Offline archetypes test (0.12.0): the two new runtime archetypes,
      # api-service (node + database) and ai-app (ai + database chatbot). Asserts
      # their workflow/template/example resolve via fetchCorpus + the real
      # grid_fetch handler, both show in the grid_start menu, and the
      # templates are internally consistent — active canonical needs: (no active
      # requires:, never both), DB connection read LAZILY (never at module top
      # level), no hardcoded connection string/secret. api-service: Node http on
      # PORT||8080, DATABASE_MONGODB_URL||MONGODB_URL, a REST resource. ai-app:
      # @cloudgrid-io/ai createClient().chat({messages}) zero-arg (no key) +
      # persists to Mongo. GUARDS that neither declares needs: vector (#1545) or a
      # cron service (#1543).
      - run: npm run test:archetypes
      # Offline QA session-log test: SessionLogger accumulates header/request/
      # calls, scrubs secrets, triggers flush on live/error/idle/exit exactly
      # once, derives the log-<Client>-<transport>-mcp.txt filename, is dark by
      # default (no CLOUDGRID_QA_SLACK_WEBHOOK → no-op), and never throws into the
      # tool path. Drives the real registered handlers + grid_note.
      - run: npm run test:session-log

  drift-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 20
      - run: npm ci
      - run: npm run test:drift-guard

  # Regression guard for the Windows bundled-CLI resolution bug (Task 28): the
  # bundled CLI must resolve from a Windows-style `file:///C:/...` module URL.
  # The test injects Windows path semantics so it runs deterministically on the
  # Linux runner; it fails on the old `new URL().pathname` code and passes on the
  # `fileURLToPath` fix.
  win-cli:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 20
      - run: npm ci
      - run: npm run test:win-cli
      # Regression guard for the Claude Desktop .mcpb Electron-spawn bug (Task
      # 30): bundled-CLI spawns must carry ELECTRON_RUN_AS_NODE=1, route through
      # cli-shim.mjs, never blindly trust process.execPath under Electron, and
      # fall through to the global-CLI/npx rungs on runtime boot failure. Fails
      # on the pre-fix code, passes on the fix.
      - run: npm run test:electron-env

  # API drift guard: the web/local editions call api.cloudgrid.io directly (drop
  # → POST /api/v2/plug, claim → POST /api/v2/entities/:id/pickup). The CLI-verb
  # drift guard above does NOT cover these direct HTTP endpoints, so a
  # deleted/renamed API endpoint would otherwise reach prod silently (this is
  # exactly how the platform once deleted the MCP's drop/claim endpoints out
  # from under it). smoke:web spawns the web edition and performs a real
  # anonymous drop against the live API, asserting a guest URL comes back — so
  # this class of break fails CI, not prod.
  smoke-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 20
      - run: npm ci
      - run: npm run smoke:web
